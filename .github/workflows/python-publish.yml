name: Python

on:
  push:
    branches: [master]
    tags: ["v*.*.*"]
  pull_request:
    branches: [master]
  workflow_dispatch:

jobs:
  test:
    name: Test with Python ${{ matrix.python-version }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.10", "3.11", "3.12", "3.13"]
    steps:
    - uses: actions/checkout@v5

    - name: Set up Python ${{ matrix.python-version }}
      uses: actions/setup-python@v5
      with:
        python-version: ${{ matrix.python-version }}

    - name: Install package and dev dependencies
      run: python -m pip install -e ".[dev]"

    - name: Check generated schema files are up to date
      if: matrix.python-version == '3.12'
      run: |
        python setup.py generate_schema
        git diff --exit-code ismrmrd/xsd/ismrmrdschema/ || \
          (echo "ERROR: Generated schema files are out of date. Run 'python setup.py generate_schema' and commit the result." && exit 1)

    - name: Run library tests
      run: python -m pytest

    - name: Run end-to-end tests
      run: bash tests/end-to-end/test-reconstruction.sh

  build:
    name: Build PyPI package
    runs-on: ubuntu-latest
    needs: test
    steps:
    - uses: actions/checkout@v5

    - name: Set up Python 3.x
      uses: actions/setup-python@v5
      with:
        python-version: "3.12"

    - name: Install package and dev dependencies
      run: python -m pip install -e ".[dev]"

    - name: Build a binary wheel and a source tarball
      run: python -m build --sdist --wheel --outdir dist/ .

    - name: Store the distribution packages
      uses: actions/upload-artifact@v7
      with:
        name: python-package-distributions
        path: dist/

  publish-to-pypi:
    name: Publish PyPI package
    if: github.event_name == 'workflow_dispatch' || github.event_name == 'push' && startsWith(github.ref, 'refs/tags')
    needs:
    - build
    runs-on: ubuntu-latest
    environment:
      name: pypi
      url: https://pypi.org/p/ismrmrmd
    permissions:
      id-token: write
    steps:
    - name: Download all the dists
      uses: actions/download-artifact@v5
      with:
        name: python-package-distributions
        path: dist/
    - name: Publish distribution 📦 to PyPI
      uses: pypa/gh-action-pypi-publish@release/v1